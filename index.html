<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta
      name="description"
      content="Local Five is a mobile-first Top 5 ranking game for local food debates, starting with Seattle pizza."
    />
    <meta property="og:title" content="Local Five" />
    <meta
      property="og:description"
      content="Make your Top 5 local food list, compare with the city, and share your ranking."
    />
    <meta property="og:image" content="https://project-hfa4f.vercel.app/social-card.svg" />
    <meta property="og:type" content="website" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="theme-color" content="#f7f2e9" />
    <title>Local Five</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <div id="app"></div>
    <div class="toast" id="toast" role="status" aria-live="polite"></div>
    <noscript>
      <main class="noscript-card">
        <h1>Local Five</h1>
        <p>Enable JavaScript to make and share your local Top 5.</p>
      </main>
    </noscript>
    <script src="/config.js" defer></script>
    <script src="/data/seed/rankbites_seed_data.js" defer></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2" defer></script>
    <script src="/app.js" defer></script>
  </body>
</html>
